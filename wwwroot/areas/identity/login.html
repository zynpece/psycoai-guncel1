<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsycoAI — Giriş</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0EEE9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.page{width:100%;max-width:420px}
.logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:1.75rem}
.logo-name{font-size:22px;font-weight:700;color:#1B2D4F;letter-spacing:-.03em;line-height:1}
.logo-sub{font-size:11px;color:#9CA3AF;margin-top:2px;letter-spacing:.02em}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 20px rgba(0,0,0,.08);padding:2rem}
h1{font-size:17px;font-weight:700;color:#111;margin-bottom:4px}
.sub{font-size:13px;color:#6B7280;margin-bottom:1.5rem;line-height:1.5}
.ok-banner{background:#ECFDF5;border:1px solid #A7F3D0;border-radius:9px;padding:9px 12px;margin-bottom:14px;font-size:13px;color:#065F46;display:none}
.alert{font-size:13px;color:#DC2626;padding:9px 11px;background:#FEF2F2;border:1px solid #FECACA;border-radius:9px;margin-bottom:12px;display:none}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.pw-w{position:relative}
input{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:9px;background:#FAFAF9;font-size:13px;font-family:inherit;color:#111;outline:none;transition:border .15s,box-shadow .15s}
input[type=password]{padding-right:40px}
input:focus{border-color:#1B2D4F;box-shadow:0 0 0 3px rgba(27,45,79,.1);background:#fff}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF;display:flex;padding:2px}
.err{font-size:11.5px;color:#DC2626;margin-top:4px;display:none}
.err.on{display:block}
.btn{width:100%;padding:11px;background:#1B2D4F;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;margin-top:6px}
.btn:hover{background:#253F6B}
.btn:disabled{opacity:.5;cursor:not-allowed}
.sp{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.link-row{text-align:center;margin-top:1rem;font-size:13px;color:#6B7280}
.link-row a{color:#1B2D4F;font-weight:600;text-decoration:none}
.notice{margin-top:12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:10px 13px;display:flex;gap:8px}
.notice svg{flex-shrink:0;color:#D97706;margin-top:1px;width:14px;height:14px}
.notice p{font-size:11.5px;color:#92400E;line-height:1.5}
</style>
</head>
<body>
<div class="page">
  <div class="logo-row">
    <svg width="42" height="42" viewBox="0 0 34 34" fill="none">
      <rect width="34" height="34" rx="9" fill="#1B2D4F"/>
      <g transform="translate(3,4)">
        <rect x="1" y="10" width="9" height="8" rx="1" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
        <polygon points="5.5,6 1,10 10,10" stroke="#C9A84C" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
        <line x1="4" y1="15" x2="4" y2="18" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="7" y1="15" x2="7" y2="18" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M14 14 Q15 11 17 13 Q18 9 20 12 Q22 10 22 14 Q22 17 18 18 Q14 17 14 14Z" stroke="#C9A84C" stroke-width="1.1" fill="none"/>
        <circle cx="24" cy="8" r="2.2" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
        <line x1="24" y1="10.2" x2="24" y2="15" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="21.5" y1="12" x2="26.5" y2="12" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="15" x2="22" y2="18" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="15" x2="26" y2="18" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
      </g>
    </svg>
    <div><div class="logo-name">PsycoAI</div><div class="logo-sub">HTP PROJEKTİF ÇİZİM ANALİZ SİSTEMİ</div></div>
  </div>
  <div class="card">
    <h1>Giriş yapın</h1>
    <p class="sub">Kayıtlı hesabınızla giriş yapın.</p>
    <div class="ok-banner" id="okBanner">✓ Hesabınız oluşturuldu. Giriş yapabilirsiniz.</div>
    <div class="alert" id="alertBox"></div>
    <form id="form" novalidate>
      <div class="field">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="ornek@kurum.edu.tr" autocomplete="email">
        <div class="err" id="emailErr">E-posta zorunludur.</div>
      </div>
      <div class="field">
        <label>Şifre</label>
        <div class="pw-w">
          <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="eye" onclick="var i=document.getElementById('pwd');i.type=i.type==='password'?'text':'password'">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
        </div>
        <div class="err" id="pwdErr">Şifre zorunludur.</div>
      </div>
      <button type="submit" class="btn" id="btn">
        <div class="sp" id="sp"></div>
        <span id="bt">Giriş Yap</span>
      </button>
    </form>
    <div class="link-row">Hesabınız yok mu? <a href="register.html">Kayıt olun</a></div>
  </div>
  <div class="notice">
    <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M7 5v2.5M7 9.2v.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    <p>Bu sistemde işlenen veriler KVKK kapsamında özel nitelikli kişisel veri statüsündedir.</p>
  </div>
</div>
<script>
var API_BASE = "http://localhost:3000";

if(localStorage.getItem("psy_token")){window.location.href="../../dashboard.html";}
if(new URLSearchParams(window.location.search).get("registered")==="1"){
  document.getElementById("okBanner").style.display="block";
}

document.getElementById("form").addEventListener("submit",async function(e){
  e.preventDefault();
  document.querySelectorAll(".err").forEach(function(el){el.classList.remove("on");});
  document.getElementById("alertBox").style.display="none";
  var em=document.getElementById("email").value.trim();
  var pw=document.getElementById("pwd").value;
  var ok=true;
  if(!em){document.getElementById("emailErr").classList.add("on");ok=false;}
  if(!pw){document.getElementById("pwdErr").classList.add("on");ok=false;}
  if(!ok)return;
  var btn=document.getElementById("btn");
  document.getElementById("sp").style.display="block";
  document.getElementById("bt").textContent="Giriş yapılıyor...";
  btn.disabled=true;
  try{
    var res=await fetch(API_BASE+"/api/auth/login",
    {method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:em.toLowerCase(),password:pw})});

    var data=await res.json();
    if(!res.ok){throw new Error(data.detail||"Giriş başarısız.");}
    localStorage.setItem("psy_token",data.access_token);
    localStorage.setItem("psy_user",JSON.stringify(data.user));
    window.location.href="../../dashboard.html";
  }catch(err){
    document.getElementById("sp").style.display="none";
    btn.disabled=false;
    document.getElementById("bt").textContent="Giriş Yap";
    var al=document.getElementById("alertBox");
    al.textContent=err.message;al.style.display="block";
  }
});
</script>
</body>
</html>
