<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PsycoAI — Analiz Raporu</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0eee9;
        display: flex;
        min-height: 100vh;
        color: #111;
      }
      .sb {
        width: 220px;
        background: #1b2d4f;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        flex-shrink: 0;
      }
      .sb-top {
        padding: 18px 18px 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .sb-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .sb-ln {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
      }
      .sb-lt {
        font-size: 9.5px;
        color: rgba(255, 255, 255, 0.35);
        margin-top: 1px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .sb-nav {
        padding: 10px 0;
        flex: 1;
      }
      .sb-g {
        font-size: 9px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.22);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 12px 18px 4px;
      }
      .sb-a {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.55);
        text-decoration: none;
        border-left: 2px solid transparent;
        transition: all 0.12s;
      }
      .sb-a svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
        opacity: 0.75;
      }
      .sb-a:hover {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.9);
      }
      .sb-a.on {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
        border-left-color: #c9a84c;
        font-weight: 600;
      }
      .sb-ft {
        padding: 13px 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .sb-u {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 10px;
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.12s;
        margin-bottom: 8px;
      }
      .sb-u:hover {
        background: rgba(255, 255, 255, 0.07);
      }
      .sb-av {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .sb-un {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.85);
      }
      .sb-ur {
        font-size: 10.5px;
        color: rgba(255, 255, 255, 0.38);
      }
      .sb-lo {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.32);
        cursor: pointer;
        background: none;
        border: none;
        font-family: inherit;
        padding: 0;
      }
      .sb-lo svg {
        width: 13px;
        height: 13px;
      }
      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        background: #fff;
        border-bottom: 1px solid #e8e5de;
        padding: 13px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .tl {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .bk {
        width: 30px;
        height: 30px;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #9ca3af;
        transition: all 0.1s;
        flex-shrink: 0;
      }
      .bk:hover {
        background: #f8f6f1;
        color: #111;
      }
      .tt {
        font-size: 14px;
        font-weight: 700;
        color: #111;
      }
      .ts {
        font-size: 11.5px;
        color: #9ca3af;
        margin-top: 1px;
      }
      .btn-p {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border: 1.5px solid #e5e7eb;
        background: #fff;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }
      .btn-p:hover {
        background: #1b2d4f;
        color: #fff;
        border-color: #1b2d4f;
      }
      .cnt {
        padding: 20px 24px;
        overflow-y: auto;
        flex: 1;
      }
      .ly2 {
        display: flex;
        gap: 16px;
        align-items: flex-start;
      }
      .lp {
        width: 220px;
        flex-shrink: 0;
      }
      .rp {
        flex: 1;
        min-width: 0;
      }
      .db {
        background: #fff;
        border: 1px solid #edebe4;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .dbt {
        font-size: 11px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .di {
        width: 100%;
        border-radius: 9px;
        border: 1px solid #edebe4;
        background: #f8f6f1;
        min-height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .di img {
        width: 100%;
        height: auto;
        display: block;
      }
      .ib {
        background: #fff;
        border: 1px solid #edebe4;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .ibt {
        font-size: 11px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }
      .ir {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 5px 0;
        border-bottom: 1px solid #f5f2ec;
        font-size: 12px;
        gap: 8px;
      }
      .ir:last-child {
        border-bottom: none;
      }
      .ik {
        color: #9ca3af;
        font-weight: 500;
        flex-shrink: 0;
      }
      .iv {
        color: #111;
        font-weight: 600;
        text-align: right;
        word-break: break-word;
      }
      .meta {
        background: #f8f6f1;
        border: 1px solid #edebe4;
        border-radius: 12px;
        padding: 13px;
        margin-bottom: 12px;
      }
      .meta-t {
        font-size: 12px;
        font-weight: 700;
        color: #374151;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .meta-g {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 7px;
        margin-bottom: 7px;
      }
      .meta-c {
        text-align: center;
        background: #fff;
        border-radius: 8px;
        padding: 9px 5px;
        border: 1px solid #edebe4;
      }
      .meta-n {
        font-size: 17px;
        font-weight: 700;
      }
      .meta-l {
        font-size: 10px;
        color: #9ca3af;
        margin-top: 2px;
      }
      .card {
        background: #fff;
        border: 1px solid #edebe4;
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 12px;
      }
      .ct {
        font-size: 14px;
        font-weight: 700;
        color: #111;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .ct svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }
      .scb {
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
        border-radius: 10px;
        padding: 11px 13px;
        margin-bottom: 12px;
      }
      .scb-r {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      .scb-l {
        font-size: 12px;
        font-weight: 600;
        color: #065f46;
      }
      .scb-n {
        font-size: 15px;
        font-weight: 700;
        color: #065f46;
      }
      .bar {
        height: 8px;
        background: rgba(5, 150, 105, 0.15);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-f {
        height: 100%;
        border-radius: 4px;
        background: #059669;
        transition: width 1s;
      }
      .dn {
        background: #eef2f9;
        border: 1px solid #c3cfe2;
        border-radius: 10px;
        padding: 11px 12px;
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .dn svg {
        flex-shrink: 0;
        color: #1b2d4f;
        margin-top: 1px;
        width: 14px;
        height: 14px;
      }
      .dnl {
        font-size: 11.5px;
        font-weight: 700;
        color: #1b2d4f;
        margin-bottom: 3px;
      }
      .dnt {
        font-size: 12px;
        color: #253f6b;
        line-height: 1.55;
      }
      .wn {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 10px;
        padding: 11px 12px;
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .wn svg {
        flex-shrink: 0;
        color: #d97706;
        margin-top: 1px;
        width: 15px;
        height: 15px;
      }
      .wn p {
        font-size: 12px;
        color: #92400e;
        line-height: 1.55;
      }
      .img-warn {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 11px 12px;
        display: none;
        gap: 8px;
        margin-bottom: 12px;
      }
      .img-warn.on {
        display: flex;
      }
      .img-warn svg {
        flex-shrink: 0;
        color: #dc2626;
        margin-top: 1px;
        width: 15px;
        height: 15px;
      }
      .img-warn p {
        font-size: 12px;
        color: #dc2626;
        line-height: 1.55;
      }
      .urgent-box {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 11px 12px;
        display: none;
        gap: 8px;
        margin-bottom: 12px;
      }
      .urgent-box.on {
        display: flex;
      }
      .urgent-box svg {
        flex-shrink: 0;
        color: #dc2626;
        margin-top: 1px;
        width: 15px;
        height: 15px;
      }
      .urgent-box p {
        font-size: 12px;
        color: #dc2626;
        line-height: 1.55;
      }
      /* Loading */
      .loading-box {
        background: #fff;
        border: 1px solid #edebe4;
        border-radius: 14px;
        padding: 36px 24px;
        text-align: center;
      }
      .loading-spin {
        width: 48px;
        height: 48px;
        margin: 0 auto 14px;
        border: 3px solid #e5e7eb;
        border-top-color: #1b2d4f;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Filters */
      .flt {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .fb {
        font-size: 12px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 20px;
        border: 1.5px solid #e5e7eb;
        background: transparent;
        cursor: pointer;
        font-family: inherit;
        color: #6b7280;
        transition: all 0.12s;
      }
      .fb.on {
        background: #1b2d4f;
        color: #fff;
        border-color: #1b2d4f;
      }
      /* Findings */
      .fg {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      .fc {
        background: #fff;
        border: 1px solid #edebe4;
        border-radius: 12px;
        padding: 14px;
        transition: border 0.15s;
      }
      .fc:hover {
        border-color: #9ca3af;
      }
      .fr {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 7px;
        flex-wrap: wrap;
      }
      .cf {
        font-size: 11.5px;
        color: #9ca3af;
        margin-left: auto;
        font-weight: 600;
        flex-shrink: 0;
      }
      .fi {
        font-size: 13px;
        font-weight: 700;
        color: #111;
        margin-bottom: 4px;
      }
      .fn {
        font-size: 12px;
        color: #374151;
        line-height: 1.5;
        margin-bottom: 6px;
      }
      .fobs {
        font-size: 11.5px;
        color: #1b2d4f;
        background: #eef2f9;
        border-radius: 6px;
        padding: 5px 8px;
        margin-bottom: 8px;
        line-height: 1.4;
      }
      .fobs strong {
        color: #1b2d4f;
      }
      .ss {
        border-top: 1px solid #f5f2ec;
        padding-top: 8px;
      }
      .ssl {
        font-size: 10px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 5px;
      }
      .ag {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 8px;
        border-radius: 7px;
        font-size: 10.5px;
        font-weight: 700;
        margin-top: 7px;
      }
      .caution-note {
        font-size: 11px;
        color: #d97706;
        background: #fffbeb;
        border-radius: 6px;
        padding: 4px 8px;
        margin-top: 5px;
        line-height: 1.4;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 9px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
      }
      .bh {
        background: #eff6ff;
        color: #1e40af;
      }
      .bt {
        background: #ecfdf5;
        color: #065f46;
      }
      .bp {
        background: #f5f3ff;
        color: #4c1d95;
      }
      .bhi {
        background: #fef2f2;
        color: #991b1b;
      }
      .bme {
        background: #fffbeb;
        color: #92400e;
      }
      .blo {
        background: #f9fafb;
        color: #6b7280;
        border: 1px solid #e5e7eb;
      }
      .bor {
        background: #ecfdf5;
        color: #065f46;
      }
      .ref-item {
        font-size: 12px;
        color: #374151;
        line-height: 1.65;
        padding: 5px 0 5px 14px;
        position: relative;
        border-bottom: 1px solid #f5f2ec;
      }
      .ref-item:last-child {
        border-bottom: none;
      }
      .ref-item::before {
        content: '·';
        position: absolute;
        left: 3px;
        color: #c9a84c;
        font-weight: 900;
        font-size: 16px;
        top: 3px;
        line-height: 1;
      }
      .eth {
        background: #fff7ed;
        border: 1px solid #fed7aa;
        border-radius: 14px;
        padding: 15px;
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }
      .eth svg {
        flex-shrink: 0;
        color: #f97316;
        margin-top: 2px;
        width: 17px;
        height: 17px;
      }
      .et {
        font-size: 13px;
        font-weight: 700;
        color: #9a3412;
        margin-bottom: 5px;
      }
      .ed {
        font-size: 12px;
        color: #c2410c;
        line-height: 1.6;
      }
      @media print {
        .sb,
        .topbar,
        .flt,
        .no-print {
          display: none !important;
        }
        body {
          background: #fff;
          display: block;
        }
        .cnt {
          padding: 14px;
        }
        .ly2 {
          flex-direction: column;
        }
        .lp {
          width: 100%;
          margin-bottom: 12px;
        }
        .fg {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>

              d="M5 2H2v9h3M9 9l3-2.5L9 4M13 6.5H5"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            /></svg
          >Çıkış
        </button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar no-print">
        <div class="tl">
          <a href="02_dashboard.html" class="bk"
            ><svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path
                d="M9 2L4 7l5 5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              /></svg
          ></a>
          <div>
            <div class="tt" id="tbT">Analiz Raporu</div>
            <div class="ts" id="tbS">—</div>
          </div>
        </div>
        <button class="btn-p no-print" onclick="window.print()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path
              d="M3 5V1h8v4M3 9H2a1 1 0 01-1-1V6a1 1 0 011-1h10a1 1 0 011 1v2a1 1 0 01-1 1h-1M3 7h8v6H3z"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            /></svg
          >PDF / Yazdır
        </button>
      </div>
      <div class="cnt" id="mainContent">
        <div class="loading-box">
          <div class="loading-spin"></div>
          <p
            style="
              font-size: 14px;
              font-weight: 600;
              color: #111;
              margin-bottom: 6px;
            "
          >
            Analiz Raporu Yükleniyor
          </p>
          <p style="font-size: 13px; color: #9ca3af">
            Veriler PostgreSQL'den alınıyor...
          </p>
        </div>
      </div>
    </div>

    <script>
var API_BASE = "http://localhost:5000";

function getToken(){return localStorage.getItem("psy_token");}
function getUser(){return JSON.parse(localStorage.getItem("psy_user")||"null");}
function authHeaders(){return{"Authorization":"Bearer "+getToken()};}
function logout(){localStorage.removeItem("psy_token");localStorage.removeItem("psy_user");window.location.href="01_login.html";}
function escHtml(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderPage(a){
  var u = getUser();
  document.getElementById("tbT").textContent = (a.figure_type||"Analiz") + " — Raporu";
  document.getElementById("tbS").textContent = new Date(a.created_at).toLocaleDateString("tr-TR");
  if(u){
    document.getElementById("avEl").textContent = u.initials||"?";
    document.getElementById("nmEl").textContent = u.name||"—";
    document.getElementById("rlEl").textContent = u.role_label||u.role||"—";
  }

  var imgSrc = a.image_path ? API_BASE+"/"+a.image_path : "";

  var html = '<div class="ly2">';

  // SOL PANEL
  html += '<div class="lp">';
  html += '<div class="db"><div class="dbt">HTP Çizimi</div>';
  if(imgSrc){
    html += '<div class="di"><img src="'+imgSrc+'" alt="Çizim"></div>';
  } else {
    html += '<div class="di" style="min-height:120px;display:flex;align-items:center;justify-content:center;color:#C4C0B8;font-size:12px">Görsel yok</div>';
  }
  html += '</div>';

  html += '<div class="ib"><div class="ibt">Analiz Bilgileri</div>';
  html += '<div class="ir"><span class="ik">Figür Türü</span><span class="iv">'+escHtml(a.figure_type||"—")+'</span></div>';
  html += '<div class="ir"><span class="ik">Tarih</span><span class="iv">'+new Date(a.created_at).toLocaleDateString("tr-TR")+'</span></div>';
  html += '<div class="ir"><span class="ik">Analiz ID</span><span class="iv">#'+a.id+'</span></div>';
  html += '</div>';

  if(u){
    html += '<div class="ib"><div class="ibt">Değerlendiren</div>';
    html += '<div class="ir"><span class="ik">Uzman</span><span class="iv">'+escHtml(u.name)+'</span></div>';
    if(u.role_label) html += '<div class="ir"><span class="ik">Unvan</span><span class="iv">'+escHtml(u.role_label)+'</span></div>';
    html += '</div>';
  }
  html += '</div>';

  // SAĞ PANEL
  html += '<div class="rp">';
  html += '<div class="wn"><svg viewBox="0 0 15 15" fill="none"><path d="M7.5 2L13 12H2L7.5 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M7.5 6v3M7.5 10.5v.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg><p><strong>Psikometrik Sınırlılık:</strong> Bu rapor uzman kararını destekler, yerini almaz. Tanı yetkisi yalnızca uzmana aittir.</p></div>';

  html += '<div class="card"><div class="ct"><svg viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="#059669" stroke-width="1.2"/><path d="M7.5 5v3l2 1.5" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/></svg>Model Analiz Sonucu</div>';
  html += '<p style="font-size:13px;color:#374151;line-height:1.8;white-space:pre-wrap">'+escHtml(a.result||"Sonuç bulunamadı.")+'</p>';
  html += '</div>';

  html += '<div class="eth"><svg viewBox="0 0 17 17" fill="none"><path d="M8.5 1.5l2 4.2 4.5.65-3.25 3.17.77 4.48-4.02-2.12-4.02 2.12.77-4.48L2 6.35l4.5-.65L8.5 1.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg><div><div class="et">Etik Sorumluluk Bildirimi</div><div class="ed">Bu rapor yalnızca karar destek amacı taşımaktadır. Nihai değerlendirme mutlaka nitelikli bir profesyonel tarafından yapılmalıdır.</div></div></div>';

  html += '</div></div>';
  document.getElementById("mainContent").innerHTML = html;
}

async function loadAnalysis(){
  if(!getToken()){logout();return;}
  var id = new URLSearchParams(window.location.search).get("id");
  if(!id){window.location.href="02_dashboard.html";return;}
  try{
    var res = await fetch(API_BASE+"/api/analyses/"+id, {headers: authHeaders()});
    if(res.status===401){logout();return;}
    if(res.status===404){
      document.getElementById("mainContent").innerHTML='<div style="text-align:center;padding:48px;color:#9CA3AF"><p style="font-size:15px;font-weight:600">Analiz bulunamadı.</p><a href="02_dashboard.html" style="color:#1B2D4F;font-weight:600;text-decoration:none;margin-top:12px;display:inline-block">← Ana Sayfaya Dön</a></div>';
      return;
    }
    var data = await res.json();
    renderPage(data);
  }catch(err){
    document.getElementById("mainContent").innerHTML='<div style="text-align:center;padding:48px;color:#DC2626"><p style="font-size:14px;font-weight:600">Yükleme hatası: '+err.message+'</p></div>';
  }
}
loadAnalysis();
    </script>
  </body>
</html>
